<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Lander</title>
    <link rel="preload" href="fonts/press-start-2p.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="fonts/space-grotesk.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      /* bundled locally (offline / Capacitor safe) — not a CDN */
      @font-face {
        font-family: 'Press Start 2P';
        src: url('fonts/press-start-2p.woff2') format('woff2');
        font-display: block;
      }
      @font-face {
        font-family: 'Space Grotesk';
        src: url('fonts/space-grotesk.woff2') format('woff2');
        font-weight: 300 700;
        font-display: block;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #05070d;
        overflow: hidden;
        /* iOS: never let the page scroll under the dynamic toolbar */
        position: fixed;
        inset: 0;
      }
      #game {
        position: fixed;
        inset: 0;
        width: 100vw;
        /* 100vh on iOS includes the strip hidden under Safari's toolbar + home bar, making the
           canvas TALLER than the visible screen (bottom controls fall off). dvh = the *visible*
           height; the plain-vh line is the fallback for browsers without dvh. */
        height: 100vh;
        height: 100dvh;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CRAppnGO.js"></script>
  </head>
  <body>
    <div id="game"></div>
  </body>
</html>
